name: Deploy to GitHub Pages

on:
  push:
    branches: [main]          # ← your default branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # Important for accurate last-modified dates if you use that feature

      - uses: actions/setup-node@v4
        with:
          node-version: 20    # or whatever you use

      - run: npm ci           # or yarn/pnpm equivalent

      - run: npm run build    # ← this creates /dist (ignored = no problem)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist          # ← uploads contents of dist/ as root of your site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
